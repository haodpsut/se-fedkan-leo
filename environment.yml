# Conda env for the RTX 4090 server (conda-only host). Install torch via the
# cuda index inside the env (pip), per the satellite-KAN lesson:
#   conda env create -f environment.yml
#   conda activate sefedkan
#   pip install torch --index-url https://download.pytorch.org/whl/cu121
name: sefedkan
channels: [conda-forge]
dependencies:
  - python=3.11
  - numpy
  - scipy
  - scikit-learn
  - pyyaml
  - h5py
  - matplotlib
  - tqdm
  - pip
  - pip:
      - skyfield
      - sgp4
